name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-api-railway:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
      RAILWAY_SERVICE_API_ID: ${{ secrets.RAILWAY_SERVICE_API_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Railway secrets
        run: |
          test -n "$RAILWAY_TOKEN"
          test -n "$RAILWAY_PROJECT_ID"
          test -n "$RAILWAY_ENVIRONMENT_ID"
          test -n "$RAILWAY_SERVICE_API_ID"

      - name: Deploy API service
        run: npx @railway/cli up apps/api --ci --detach --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT_ID" --service "$RAILWAY_SERVICE_API_ID" --path-as-root

  deploy-web-vercel:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Vercel secrets
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        working-directory: apps/web

      - name: Build production artifacts
        run: npx vercel build --prod --token="$VERCEL_TOKEN"
        working-directory: apps/web

      - name: Deploy to production
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        working-directory: apps/web
